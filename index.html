<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>券商外呼记录平台</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', Arial, sans-serif;
  font-size: 13px;
  background: #f0f2f5;
  color: #333;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ===== ICON SIDEBAR ===== */
.icon-sidebar {
  width: 48px; background: #1d3461;
  display: flex; flex-direction: column; align-items: center; flex-shrink: 0;
}
.icon-sidebar .logo-box {
  width: 48px; height: 50px;
  display: flex; align-items: center; justify-content: center;
  background: #162952;
}
.nav-icons {
  display: flex; flex-direction: column; align-items: center;
  padding: 6px 0; gap: 2px; width: 100%;
}
.nav-icon {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px; cursor: pointer; color: #7fa0d0;
  transition: background .15s, color .15s;
}
.nav-icon:hover, .nav-icon.active { background: #2b4aaf; color: #fff; }
.nav-icon svg { width: 17px; height: 17px; display: block; }
.bottom-icons {
  margin-top: auto; display: flex; flex-direction: column;
  align-items: center; gap: 2px; padding-bottom: 10px;
}

/* ===== WRAPPER ===== */
.wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* ===== TOP HEADER ===== */
.top-header {
  height: 50px; background: #fff;
  border-bottom: 1px solid #e4e7ed;
  display: flex; align-items: center; padding: 0 16px;
  flex-shrink: 0; gap: 8px;
}
.brand { display: flex; align-items: center; gap: 7px; font-size: 15px; font-weight: 600; color: #1d3461; }
.spacer { flex: 1; }
.user-info { display: flex; align-items: center; gap: 5px; font-size: 13px; color: #555; cursor: pointer; }
.vline { width: 1px; height: 18px; background: #ddd; margin: 0 8px; }
.hdr-icon { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 4px; cursor: pointer; color: #888; }
.hdr-icon:hover { background: #f5f5f5; }

/* ===== BODY ===== */
.body { flex: 1; display: flex; overflow: hidden; }

/* ===== LEFT NAV ===== */
.left-nav {
  width: 100px; background: #fff;
  border-right: 1px solid #e4e7ed;
  flex-shrink: 0; padding: 8px 0;
}
.lnav-item {
  height: 46px; display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: #666; cursor: pointer;
  border-left: 3px solid transparent;
  padding: 0 8px; text-align: center; line-height: 1.3;
  transition: all .12s;
}
.lnav-item:hover { color: #2b4aaf; background: #eef2fb; }
.lnav-item.active { color: #2b4aaf; background: #eef2fb; border-left-color: #2b4aaf; font-weight: 500; }

/* ===== MAIN CONTENT ===== */
.main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #f0f2f5; }

/* ===== VIEW PANE ===== */
.view-pane { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
.view-pane.hidden { display: none; }

/* ===== FILTER PANEL ===== */
.filter-panel {
  background: #fff; margin: 12px 16px 0 16px;
  padding: 14px 16px 0 16px;
  flex-shrink: 0;
  border: 1px solid #e4e7ed; border-bottom: none;
  border-radius: 4px 4px 0 0;
}
.filter-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 10px 12px; margin-bottom: 10px;
}
.f-field {
  height: 30px; border: 1px solid #dcdfe6; border-radius: 3px;
  background: #fff; display: flex; align-items: center;
  padding: 0 8px; gap: 5px; font-size: 12px; color: #c0c4cc;
  transition: border-color .15s; position: relative;
}
.f-field:hover { border-color: #b0b8cc; }
.f-field:focus-within { border-color: #2b4aaf; }
.f-field input, .f-field select {
  border: none; outline: none; font-size: 12px; color: #606266;
  font-family: inherit; background: transparent; flex: 1; min-width: 0;
  cursor: pointer; appearance: none; -webkit-appearance: none;
}
.f-field input::placeholder { color: #c0c4cc; }
.f-icon { color: #c0c4cc; flex-shrink: 0; }
.f-caret { color: #c0c4cc; flex-shrink: 0; margin-left: auto; }
.f-label { font-size: 12px; color: #606266; white-space: nowrap; flex-shrink: 0; }
.f-sep { color: #c0c4cc; font-size: 12px; flex-shrink: 0; }
.query-cell { display: flex; align-items: center; gap: 8px; }
.query-btn {
  height: 30px; padding: 0 20px; border-radius: 3px;
  border: none; background: #2b4aaf; color: #fff;
  font-size: 12px; font-family: inherit; font-weight: 500;
  cursor: pointer; transition: background .12s;
}
.query-btn:hover { background: #1e3580; }
.reset-btn {
  height: 30px; padding: 0 14px; border-radius: 3px;
  border: 1px solid #dcdfe6; background: #fff;
  font-size: 12px; font-family: inherit; color: #606266;
  cursor: pointer;
}
.reset-btn:hover { border-color: #2b4aaf; color: #2b4aaf; }

/* ===== SHOW SECTION ===== */
.show-section {
  background: #fff; margin: 0 16px;
  border: 1px solid #e4e7ed; border-top: 1px solid #eef0f5;
  padding: 10px 16px; display: flex; align-items: center;
  gap: 6px; font-size: 13px; color: #444; font-weight: 500; flex-shrink: 0;
}

/* ===== TABLE AREA ===== */
.table-area { flex: 1; overflow: auto; padding: 0 16px 16px 16px; }

/* ===== TOOLBAR ===== */
.toolbar {
  display: flex; align-items: center; justify-content: flex-end;
  gap: 8px; padding: 10px 0 8px 0;
  position: sticky; top: 0; background: #f0f2f5; z-index: 5;
}
.act-btn {
  height: 30px; padding: 0 14px; border-radius: 3px;
  border: 1px solid #dcdfe6; background: #fff;
  font-size: 12px; font-family: inherit; color: #606266;
  cursor: pointer; transition: all .12s; white-space: nowrap;
  display: inline-flex; align-items: center; gap: 4px;
}
.act-btn:hover { border-color: #2b4aaf; color: #2b4aaf; }
.act-btn.primary-btn { background: #2b4aaf; border-color: #2b4aaf; color: #fff; }
.act-btn.primary-btn:hover { background: #1e3580; }

/* ===== TABLE ===== */
.table-card { background: #fff; border: 1px solid #e4e7ed; border-radius: 4px; overflow: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead tr { background: #fafafa; border-bottom: 1px solid #ebeef5; position: sticky; top: 0; z-index: 3; }
th { padding: 11px 16px; font-weight: 500; color: #909399; text-align: left; white-space: nowrap; border-right: 1px solid #ebeef5; }
th:last-child { border-right: none; }
tbody tr { border-bottom: 1px solid #ebeef5; transition: background .1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: #f5f7ff; }
td { padding: 13px 16px; color: #606266; white-space: nowrap; font-size: 12px; border-right: 1px solid #ebeef5; }
td:last-child { border-right: none; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #d3d8e8; border-radius: 3px; }

/* ===== PAGINATION ===== */
.pagination {
  display: flex; align-items: center; justify-content: flex-end;
  gap: 8px; padding: 12px 0 4px 0; font-size: 12px; color: #606266;
}
.pg-total { color: #909399; }
.pg-size {
  height: 28px; padding: 0 22px 0 8px; border: 1px solid #dcdfe6;
  border-radius: 3px; background: #fff; font-size: 12px; color: #606266;
  font-family: inherit; cursor: pointer; outline: none;
  appearance: none; -webkit-appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='%23c0c4cc' stroke-width='2.5'><polyline points='6 9 12 15 18 9'/></svg>");
  background-repeat: no-repeat; background-position: right 6px center;
}
.pg-btn {
  min-width: 28px; height: 28px; padding: 0 8px;
  border: 1px solid #dcdfe6; border-radius: 3px; background: #fff;
  font-size: 12px; color: #606266; font-family: inherit;
  cursor: pointer; transition: all .12s;
}
.pg-btn:hover:not(:disabled) { border-color: #2b4aaf; color: #2b4aaf; }
.pg-btn.active { background: #2b4aaf; border-color: #2b4aaf; color: #fff; }
.pg-btn:disabled { color: #c0c4cc; cursor: not-allowed; background: #f5f7fa; }

/* ===== SUMMARY CARDS ===== */
.summary-row {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 12px; margin: 12px 16px 0 16px; flex-shrink: 0;
}
.summary-card {
  background: #fff; border: 1px solid #e4e7ed; border-radius: 4px;
  padding: 16px 20px; display: flex; flex-direction: column; gap: 6px;
}
.summary-label { font-size: 12px; color: #909399; }
.summary-value { font-size: 24px; font-weight: 600; color: #303133; line-height: 1; }
.summary-value.blue  { color: #2b4aaf; }
.summary-value.green { color: #67c23a; }
.summary-value.orange{ color: #e6a23c; }
.summary-sub { font-size: 11px; color: #c0c4cc; margin-top: 2px; }

/* ===== UPLOAD MODAL ===== */
.modal-mask {
  display: none; position: fixed; inset: 0; z-index: 9000;
  background: rgba(0,0,0,.45);
  align-items: center; justify-content: center;
}
.modal-mask.open { display: flex; }
.modal-box {
  background: #fff; border-radius: 6px; width: 480px;
  box-shadow: 0 8px 32px rgba(0,0,0,.18);
}
.modal-hd {
  padding: 16px 20px; border-bottom: 1px solid #ebeef5;
  font-size: 15px; font-weight: 600; color: #303133;
  display: flex; align-items: center; justify-content: space-between;
}
.modal-close {
  cursor: pointer; color: #909399; line-height: 0;
  padding: 4px; border-radius: 3px;
}
.modal-close:hover { color: #303133; background: #f5f5f5; }
.modal-bd { padding: 24px 20px; }
.modal-ft {
  padding: 12px 20px 16px; border-top: 1px solid #ebeef5;
  display: flex; justify-content: flex-end; gap: 10px;
}
.upload-zone {
  border: 2px dashed #dcdfe6; border-radius: 6px;
  padding: 36px 24px; text-align: center; cursor: pointer;
  transition: border-color .15s; margin-bottom: 16px;
}
.upload-zone:hover { border-color: #2b4aaf; }
.upload-zone.has-file { border-color: #67c23a; background: #f0f9eb; }
.upload-text { font-size: 13px; color: #606266; margin-top: 10px; }
.upload-hint { font-size: 12px; color: #909399; margin-top-4px; }
.form-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.form-label { font-size: 12px; color: #606266; width: 80px; flex-shrink: 0; text-align: right; }
.form-input {
  flex: 1; height: 32px; border: 1px solid #dcdfe6; border-radius: 3px;
  padding: 0 10px; font-size: 12px; font-family: inherit; color: #303133;
  outline: none;
}
.form-input:focus { border-color: #2b4aaf; }
.cancel-btn {
  height: 32px; padding: 0 18px; border-radius: 3px;
  border: 1px solid #dcdfe6; background: #fff;
  font-size: 13px; font-family: inherit; color: #606266; cursor: pointer;
}
.cancel-btn:hover { border-color: #2b4aaf; color: #2b4aaf; }
.confirm-btn {
  height: 32px; padding: 0 18px; border-radius: 3px;
  border: none; background: #2b4aaf; color: #fff;
  font-size: 13px; font-family: inherit; cursor: pointer;
}
.confirm-btn:hover { background: #1e3580; }

/* ===== ACTION LINKS ===== */
.link-btn {
  color: #2b4aaf; font-size: 12px; text-decoration: none;
  cursor: pointer; background: none; border: none; font-family: inherit;
  padding: 0;
}
.link-btn:hover { color: #1e3580; text-decoration: underline; }
.link-btn.danger { color: #f56c6c; }
.link-btn.danger:hover { color: #c0392b; }
.link-divider { color: #e4e7ed; margin: 0 6px; }

/* ===== TOAST ===== */
.toast-container {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none;
}
.toast {
  min-width: 260px; padding: 10px 14px; border-radius: 4px;
  background: #f0f9eb; border: 1px solid #b3e19d; color: #67c23a;
  font-size: 13px; display: flex; align-items: center; gap: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
  animation: toast-in .25s ease-out;
}
@keyframes toast-in {
  from { opacity: 0; transform: translateY(-10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ===== DELETE CONFIRM ===== */
.del-modal-box {
  background: #fff; border-radius: 6px; width: 380px;
  box-shadow: 0 8px 32px rgba(0,0,0,.18);
  padding: 28px 24px 20px;
}
.del-modal-icon { text-align: center; margin-bottom: 14px; }
.del-modal-title { font-size: 15px; font-weight: 600; color: #303133; text-align: center; margin-bottom: 8px; }
.del-modal-desc { font-size: 13px; color: #606266; text-align: center; line-height: 1.6; margin-bottom: 20px; }
.del-modal-ft { display: flex; justify-content: center; gap: 12px; }
</style>
</head>
<body>

<!-- Icon Sidebar -->
<div class="icon-sidebar">
  <div class="logo-box">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
    </svg>
  </div>
  <div class="nav-icons">
    <div class="nav-icon active" title="外呼管理">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 11.41a19.79 19.79 0 01-3.07-8.68A2 2 0 012 .73h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.53a16 16 0 006.29 6.29l1.17-1.17a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7a2 2 0 011.73 2.02z"/>
      </svg>
    </div>
    <div class="nav-icon" title="数据报表">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/>
      </svg>
    </div>
    <div class="nav-icon" title="系统设置">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/>
      </svg>
    </div>
  </div>
  <div class="bottom-icons">
    <div class="nav-icon" title="退出">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
      </svg>
    </div>
  </div>
</div>

<!-- Wrapper -->
<div class="wrapper">
  <!-- Top Header -->
  <div class="top-header">
    <div class="brand">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2b4aaf" stroke-width="2">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      券商外呼记录平台
    </div>
    <div class="spacer"></div>
    <div class="hdr-icon" title="消息">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/>
      </svg>
    </div>
    <div class="vline"></div>
    <div class="user-info">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
      国元证券
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
  </div>

  <!-- Body -->
  <div class="body">
    <!-- Left Nav -->
    <div class="left-nav">
      <div class="lnav-item active" onclick="switchNav(this,'view-outbound')">外呼统计表</div>
      <div class="lnav-item" onclick="switchNav(this,'view-scripts')">已审核话术素材</div>
    </div>

    <!-- Main Content -->
    <div class="main-content">

      <!-- ===== 外呼统计表 ===== -->
      <div id="view-outbound" class="view-pane">

        <!-- Summary Cards -->
        <div class="summary-row">
          <div class="summary-card">
            <div class="summary-label">今日导入线索数</div>
            <div class="summary-value blue" id="s-import">—</div>
            <div class="summary-sub">条线索</div>
          </div>
          <div class="summary-card">
            <div class="summary-label">今日拨打线索数</div>
            <div class="summary-value" id="s-dial">—</div>
            <div class="summary-sub">条线索</div>
          </div>
          <div class="summary-card">
            <div class="summary-label">今日接听线索数</div>
            <div class="summary-value green" id="s-answer">—</div>
            <div class="summary-sub">接通率 <span id="s-rate">—</span></div>
          </div>
          <div class="summary-card">
            <div class="summary-label">今日意向线索数</div>
            <div class="summary-value orange" id="s-intent">—</div>
            <div class="summary-sub">意向率 <span id="s-irate">—</span></div>
          </div>
        </div>

        <!-- Filter Panel -->
        <div class="filter-panel">
          <div class="filter-grid">
            <div class="f-field">
              <span class="f-label">拨打日期：</span>
              <input type="text" id="dateFrom" placeholder="开始日期" onfocus="this.type='date'" onblur="if(!this.value)this.type='text'">
              <span class="f-sep">—</span>
              <input type="text" id="dateTo" placeholder="结束日期" onfocus="this.type='date'" onblur="if(!this.value)this.type='text'">
            </div>
            <div class="query-cell">
              <button class="query-btn" onclick="doQuery()">查询</button>
              <button class="reset-btn" onclick="doReset('outbound')">重置</button>
            </div>
          </div>
        </div>

        <!-- Show section -->
        <div class="show-section">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>
          共 <span id="outbound-count">5</span> 条记录
        </div>

        <!-- Table -->
        <div class="table-area">
          <div class="toolbar">
            <button class="act-btn" onclick="exportTable()">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              导出
            </button>
          </div>
          <div class="table-card">
            <table id="outbound-table">
              <thead>
                <tr>
                  <th>拨打日期</th>
                  <th>导入线索数</th>
                  <th>拨打线索数</th>
                  <th>接听线索数</th>
                  <th>接通率</th>
                  <th>意向线索数</th>
                  <th>意向率</th>
                </tr>
              </thead>
              <tbody id="outbound-tbody"></tbody>
            </table>
          </div>
          <div class="pagination" id="outbound-pg"></div>
        </div>
      </div>

      <!-- ===== 已审核话术素材 ===== -->
      <div id="view-scripts" class="view-pane hidden">

        <!-- Filter Panel -->
        <div class="filter-panel" style="margin-top:12px;">
          <div class="filter-grid">
            <div class="f-field">
              <svg class="f-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input placeholder="话术名称" id="script-search">
            </div>
            <div class="f-field">
              <span class="f-label">审核日期：</span>
              <input type="text" id="scriptDateFrom" placeholder="开始日期" onfocus="this.type='date'" onblur="if(!this.value)this.type='text'">
              <span class="f-sep">—</span>
              <input type="text" id="scriptDateTo" placeholder="结束日期" onfocus="this.type='date'" onblur="if(!this.value)this.type='text'">
            </div>
            <div class="query-cell">
              <button class="query-btn" onclick="doScriptQuery()">查询</button>
              <button class="reset-btn" onclick="doReset('scripts')">重置</button>
            </div>
          </div>
        </div>

        <div class="show-section">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>
          共 <span id="scripts-count">4</span> 条记录
        </div>

        <div class="table-area">
          <div class="toolbar">
            <button class="act-btn primary-btn" onclick="openUploadModal()">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              上传话术文件
            </button>
          </div>
          <div class="table-card">
            <table id="scripts-table">
              <thead>
                <tr>
                  <th>话术审核日期</th>
                  <th>话术名称</th>
                  <th>文件类型</th>
                  <th>文件大小</th>
                  <th>上传人</th>
                  <th style="width:120px;">操作</th>
                </tr>
              </thead>
              <tbody id="scripts-tbody"></tbody>
            </table>
          </div>
          <div class="pagination" id="scripts-pg"></div>
        </div>
      </div>

    </div><!-- end main-content -->
  </div>
</div><!-- end wrapper -->

<!-- Upload Modal -->
<div class="modal-mask" id="uploadModal">
  <div class="modal-box">
    <div class="modal-hd">
      上传话术文件
      <span class="modal-close" onclick="closeModal('uploadModal')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </span>
    </div>
    <div class="modal-bd">
      <div class="form-row">
        <span class="form-label">话术名称 <span style="color:#f56c6c">*</span></span>
        <input class="form-input" id="scriptName" placeholder="请输入话术名称">
      </div>
      <div class="form-row">
        <span class="form-label">审核日期 <span style="color:#f56c6c">*</span></span>
        <input class="form-input" id="scriptDate" type="date">
      </div>
      <div class="upload-zone" id="fileZone" onclick="document.getElementById('fileInput').click()">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#c0c4cc" stroke-width="1.5">
          <polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/>
          <path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/>
        </svg>
        <div class="upload-text" id="fileZoneText">点击选择文件</div>
        <div class="upload-hint">支持 .mp3、.wav、.pdf、.docx 格式</div>
        <input type="file" id="fileInput" accept=".mp3,.wav,.pdf,.docx" style="display:none" onchange="handleScriptFile(this)">
      </div>
    </div>
    <div class="modal-ft">
      <button class="cancel-btn" onclick="closeModal('uploadModal')">取消</button>
      <button class="confirm-btn" onclick="submitScript()">确认上传</button>
    </div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal-mask" id="delModal">
  <div class="del-modal-box">
    <div class="del-modal-icon">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#e6a23c" stroke-width="1.5">
        <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
    </div>
    <div class="del-modal-title">确认删除</div>
    <div class="del-modal-desc">删除后该话术文件及记录将无法恢复，<br>请确认是否继续？</div>
    <div class="del-modal-ft">
      <button class="cancel-btn" onclick="closeModal('delModal')">取消</button>
      <button class="confirm-btn" style="background:#f56c6c;border-color:#f56c6c;" onclick="confirmDelete()">确认删除</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ===== DATA =====
const today = new Date();
function fmtDate(d) {
  return d.toISOString().slice(0,10);
}
function randBetween(a,b) { return Math.floor(Math.random()*(b-a+1))+a; }

// Generate 5 days of outbound data
let outboundData = [];
for(let i=4; i>=0; i--) {
  const d = new Date(today);
  d.setDate(d.getDate()-i);
  const imp = randBetween(800, 1500);
  const dial = imp;
  const answer = Math.floor(dial * (0.50 + Math.random()*0.20));
  const intent = Math.floor(answer * (0.30 + Math.random()*0.20));
  outboundData.push({ date: fmtDate(d), imp, dial, answer, intent });
}

let scriptsData = [
  { date: '2026-06-10', name: '国元证券Q2季度主推产品话术_v2.pdf', type: 'PDF', size: '1.2 MB', uploader: '张经理' },
  { date: '2026-06-05', name: '新客户开户引导话术脚本_终版.docx', type: 'DOCX', size: '856 KB', uploader: '李主任' },
  { date: '2026-05-28', name: '基金定投推介话术录音_20260528.mp3', type: 'MP3', size: '18.4 MB', uploader: '王坐席' },
  { date: '2026-05-20', name: '权益类产品风险提示标准话术.pdf', type: 'PDF', size: '640 KB', uploader: '张经理' },
];
let pendingDeleteIdx = null;

// ===== RENDER OUTBOUND =====
function renderOutbound(data) {
  const tbody = document.getElementById('outbound-tbody');
  tbody.innerHTML = '';
  if(data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#909399;padding:40px;">暂无数据</td></tr>';
    return;
  }
  data.forEach(row => {
    const rate = (row.answer/row.dial*100).toFixed(1)+'%';
    const irate = (row.intent/row.answer*100).toFixed(1)+'%';
    tbody.innerHTML += `<tr>
      <td>${row.date}</td>
      <td><b style="color:#303133">${row.imp.toLocaleString()}</b></td>
      <td>${row.dial.toLocaleString()}</td>
      <td><span style="color:#67c23a;font-weight:500">${row.answer.toLocaleString()}</span></td>
      <td><span style="background:#f0f9eb;color:#67c23a;padding:2px 8px;border-radius:3px;font-size:11px">${rate}</span></td>
      <td><span style="color:#e6a23c;font-weight:500">${row.intent.toLocaleString()}</span></td>
      <td><span style="background:#fdf6ec;color:#e6a23c;padding:2px 8px;border-radius:3px;font-size:11px">${irate}</span></td>
    </tr>`;
  });
  document.getElementById('outbound-count').textContent = data.length;

  // Update summary cards from latest row
  const latest = data[data.length-1];
  document.getElementById('s-import').textContent  = latest.imp.toLocaleString();
  document.getElementById('s-dial').textContent    = latest.dial.toLocaleString();
  document.getElementById('s-answer').textContent  = latest.answer.toLocaleString();
  document.getElementById('s-intent').textContent  = latest.intent.toLocaleString();
  document.getElementById('s-rate').textContent    = (latest.answer/latest.dial*100).toFixed(1)+'%';
  document.getElementById('s-irate').textContent   = (latest.intent/latest.answer*100).toFixed(1)+'%';
}

// ===== RENDER SCRIPTS =====
function renderScripts(data) {
  const tbody = document.getElementById('scripts-tbody');
  tbody.innerHTML = '';
  if(data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#909399;padding:40px;">暂无话术文件，请点击右上角上传</td></tr>';
    document.getElementById('scripts-count').textContent = 0;
    return;
  }
  data.forEach((row, idx) => {
    const typeColor = {PDF:'#f56c6c', DOCX:'#2b4aaf', MP3:'#67c23a', WAV:'#e6a23c'}[row.type] || '#909399';
    tbody.innerHTML += `<tr>
      <td>${row.date}</td>
      <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;">${row.name}</td>
      <td><span style="background:${typeColor}18;color:${typeColor};padding:1px 8px;border-radius:3px;font-size:11px;font-weight:600">${row.type}</span></td>
      <td>${row.size}</td>
      <td>${row.uploader}</td>
      <td>
        <button class="link-btn" onclick="downloadScript(${idx})">下载</button>
        <span class="link-divider">|</span>
        <button class="link-btn danger" onclick="openDelete(${idx})">删除</button>
      </td>
    </tr>`;
  });
  document.getElementById('scripts-count').textContent = data.length;
}

// ===== NAV =====
function switchNav(el, viewId) {
  document.querySelectorAll('.lnav-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.view-pane').forEach(p => p.classList.add('hidden'));
  document.getElementById(viewId).classList.remove('hidden');
}

// ===== QUERY =====
function doQuery() {
  const from = document.getElementById('dateFrom').value;
  const to   = document.getElementById('dateTo').value;
  let filtered = outboundData;
  if(from) filtered = filtered.filter(r => r.date >= from);
  if(to)   filtered = filtered.filter(r => r.date <= to);
  renderOutbound(filtered);
  showToast('查询完成，共 '+filtered.length+' 条记录');
}
function doScriptQuery() {
  const kw   = document.getElementById('script-search').value.trim().toLowerCase();
  const from = document.getElementById('scriptDateFrom').value;
  const to   = document.getElementById('scriptDateTo').value;
  let filtered = scriptsData;
  if(kw)   filtered = filtered.filter(r => r.name.toLowerCase().includes(kw));
  if(from) filtered = filtered.filter(r => r.date >= from);
  if(to)   filtered = filtered.filter(r => r.date <= to);
  renderScripts(filtered);
  showToast('查询完成，共 '+filtered.length+' 条记录');
}
function doReset(type) {
  if(type==='outbound') {
    document.getElementById('dateFrom').value='';
    document.getElementById('dateTo').value='';
    renderOutbound(outboundData);
  } else {
    document.getElementById('script-search').value='';
    document.getElementById('scriptDateFrom').value='';
    document.getElementById('scriptDateTo').value='';
    renderScripts(scriptsData);
  }
}

// ===== EXPORT =====
function exportTable() { showToast('数据导出成功'); }

// ===== UPLOAD MODAL =====
function openUploadModal() {
  document.getElementById('scriptDate').value = fmtDate(today);
  document.getElementById('uploadModal').classList.add('open');
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function handleScriptFile(input) {
  if(input.files && input.files[0]) {
    const f = input.files[0];
    document.getElementById('fileZoneText').textContent = '已选择：' + f.name;
    document.getElementById('fileZone').classList.add('has-file');
    if(!document.getElementById('scriptName').value) {
      document.getElementById('scriptName').value = f.name.replace(/\.[^.]+$/,'');
    }
  }
}
function submitScript() {
  const name = document.getElementById('scriptName').value.trim();
  const date = document.getElementById('scriptDate').value;
  const file = document.getElementById('fileInput').files[0];
  if(!name){ showToast('请输入话术名称','warn'); return; }
  if(!date){ showToast('请选择审核日期','warn'); return; }
  if(!file){ showToast('请选择文件','warn'); return; }
  const ext = file.name.split('.').pop().toUpperCase();
  const size = file.size > 1048576 ? (file.size/1048576).toFixed(1)+' MB' : Math.round(file.size/1024)+' KB';
  scriptsData.unshift({ date, name: file.name, type: ext, size, uploader: '国元证券' });
  closeModal('uploadModal');
  renderScripts(scriptsData);
  // reset modal
  document.getElementById('scriptName').value='';
  document.getElementById('fileInput').value='';
  document.getElementById('fileZoneText').textContent='点击选择文件';
  document.getElementById('fileZone').classList.remove('has-file');
  showToast('话术文件上传成功');
}

// ===== DELETE =====
function openDelete(idx) { pendingDeleteIdx = idx; document.getElementById('delModal').classList.add('open'); }
function confirmDelete() {
  scriptsData.splice(pendingDeleteIdx, 1);
  closeModal('delModal');
  renderScripts(scriptsData);
  showToast('已删除该话术记录');
}
function downloadScript(idx) { showToast('开始下载：' + scriptsData[idx].name); }

// ===== TOAST =====
function showToast(msg, type) {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast';
  if(type==='warn') { t.style.background='#fdf6ec'; t.style.borderColor='#faecd8'; t.style.color='#e6a23c'; }
  t.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
    <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
  </svg>${msg}`;
  c.appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

// ===== INIT =====
renderOutbound(outboundData);
renderScripts(scriptsData);
</script>
</body>
</html>
